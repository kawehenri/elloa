# Publica só a pasta dist/ no GitHub Pages.
# Requisito: Repo → Settings → Pages → Build: GitHub Actions (não "Deploy from branch" com pasta errada).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: npm ci && npm run build

      - name: Verificar index.html na dist
        run: |
          test -f dist/index.html || (echo "::error::dist/index.html não existe — o build falhou?" && exit 1)
          ls -la dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
